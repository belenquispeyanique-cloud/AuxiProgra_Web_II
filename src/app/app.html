<div class="container mt-5">
  <div class="card shadow-lg">
    <div class="card-header bg-primary text-white text-center">
      <h1>{{ title }}</h1>
    </div>

    <div class="card-body">

      <div class="input-group mb-4">
        <input
          id="nuevo"
          type="text"
          class="form-control"
          [(ngModel)]="nuevaPrenda"
          placeholder="Ingrese una prenda"
        >
        <button class="btn btn-success" (click)="agregar()">
          Agregar
        </button>
      </div>

      <ul class="list-group">
        <li
          *ngFor="let prenda of prendas; let i = index"
          class="list-group-item d-flex justify-content-between align-items-center"
        >

          <div>
            <span class="fw-bold">{{ prenda.nombre }}</span>

            <span
              *ngIf="prenda.favorito"
              class="badge bg-warning text-dark ms-2"
            >
              ⭐ Favorita
            </span>
          </div>

          <div>
            <button
              class="btn btn-outline-warning btn-sm me-2"
              (click)="prenda.favorito = !prenda.favorito"
            >
              ❤
            </button>

            <button
              class="btn btn-outline-danger btn-sm"
              (click)="eliminar(i)"
            >
              Eliminar
            </button>
          </div>

        </li>
      </ul>

    </div>
  </div>
</div>
